name: Build Resume

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install puppeteer
        run: npm install --no-save puppeteer

      - name: Disable AppArmor namespace restriction
        run: echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns

      - name: Create output directory
        run: mkdir -p out

      - name: Validate English resume
        run: npm run validate

      - name: Validate French resume
        run: npm run validate_fr

      - name: Render English HTML
        run: npx resumed render -o out/Xavier-SALINIERE_resume.EN.html

      - name: Render French HTML
        run: npx resumed render resume.fr.json -o out/Xavier-SALINIERE_resume.FR.html

      - name: Export English PDF
        run: npx resumed export -o out/Xavier-SALINIERE_resume.EN.pdf

      - name: Export French PDF
        run: npx resumed export resume.fr.json -o out/Xavier-SALINIERE_resume.FR.pdf

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -f out/resume.html out/resume.pdf
          git add -f out/Xavier-SALINIERE_resume.EN.html out/Xavier-SALINIERE_resume.EN.pdf out/Xavier-SALINIERE_resume.FR.html out/Xavier-SALINIERE_resume.FR.pdf
          git add -u out/
          git diff --quiet && git diff --staged --quiet || git commit -m "[skip ci] build: generate resume files (EN/FR)"
          git push

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: resume
          path: out/
          retention-days: 90
