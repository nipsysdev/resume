name: Build Resume

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install puppeteer
        run: npm install --no-save puppeteer

      - name: Disable AppArmor namespace restriction
        run: echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns

      - name: Validate resume
        run: npm run validate

      - name: Create output directory
        run: mkdir -p out

      - name: Render HTML
        run: npx resumed render --output out/resume.html

      - name: Export PDF
        run: npx resumed export --output out/resume.pdf

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: resume
          path: out/
          retention-days: 90
